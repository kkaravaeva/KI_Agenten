behaviors:
  LabyrinthNavigator:
    trainer_type: ppo

    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
      memory:
        sequence_length: 16
        memory_size: 128
        memory_type: transformer

    hyperparameters:
      learning_rate: 1.0e-4
      batch_size: 1024
      buffer_size: 81920
      beta: 1.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: constant   # Fix 2.3

    reward_signals:
      extrinsic:
        gamma: 0.997
        strength: 1.0
      curiosity:
        strength: 0.02                   # Fix 4.1
        gamma: 0.99
        learning_rate: 3.0e-4
        network_settings:
          hidden_units: 128
          num_layers: 2

    max_steps: 5000
    time_horizon: 256
    summary_freq: 1000
    keep_checkpoints: 2
    checkpoint_interval: 1000
