behaviors:
  LabyrinthNavigator:
    trainer_type: ppo

    network_settings:
      normalize: false
      hidden_units: 256    # = d_model des Transformers (nhead=4 → 64 dim/Head)
      num_layers: 2        # MLP-Schichten vor dem Transformer
      memory:
        sequence_length: 8    # Attention-Fenster: 8 vergangene Steps
        memory_size: 128      # output_size = 128//2 = 64 (LSTM-kompatibel)
        memory_type: transformer

    hyperparameters:
      learning_rate: 3.0e-4
      batch_size: 512
      buffer_size: 10240
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    seed: 42
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 200000
