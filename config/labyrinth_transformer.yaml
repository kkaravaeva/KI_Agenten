behaviors:
  LabyrinthNavigator:
    trainer_type: ppo

    network_settings:
      normalize: false
      hidden_units: 256    # = d_model des Transformers (nhead=4 → 64 dim/Head)
      num_layers: 2        # MLP-Schichten vor dem Transformer
      memory:
        sequence_length: 16   # Attention-Fenster: 16 vergangene Steps
        memory_size: 128      # output_size = 128//2 = 64 (LSTM-kompatibel)
        memory_type: transformer

    hyperparameters:
      learning_rate: 1.0e-4
      batch_size: 1024
      buffer_size: 81920
      beta: 5.0e-4                       # V18: 1e-3 linear→0 ersetzt durch konstantes 5e-4. V17 ließ β bis 3e-5 fallen (effektiv null Exploration), nachweislich Mitschuld am P2-Plateau bei EMA 0.49. Floor 5e-4 hält Re-Exploration in späten Phasen lebendig, ohne P0/P1 stark zu stören.
      beta_schedule: constant            # V18: linear → constant. Mit constant ist max_steps für β irrelevant (kein Decay mehr). max_steps regelt jetzt nur Trainer-Laufzeit + LR-Decay (LR ist ohnehin schon constant).
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: constant   # Fix 2.3: vorher linear → constant (weniger Forgetting in späten Phasen)

    reward_signals:
      extrinsic:
        gamma: 0.997
        strength: 1.0
      curiosity:
        strength: 0.02                   # Fix 4.1: vorher 0.05 → 0.02 (Curiosity hat in Phase 4 nicht geholfen)
        gamma: 0.99
        learning_rate: 3.0e-4
        network_settings:
          hidden_units: 128
          num_layers: 2

    max_steps: 50000000                  # V20: 20M → 50M für Nachttraining. β und LR sind constant, daher kein Decay-Effekt; max_steps wirkt nur als Trainer-Termination.
    time_horizon: 256
    summary_freq: 20000
    keep_checkpoints: 5
    checkpoint_interval: 500000
